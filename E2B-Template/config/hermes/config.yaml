# Agent-only configuration baked into every FromDonna sandbox.
# Cloudflare gateway Worker = channel-agnostic edge (webhooks + provision + API proxies).
# Sandbox = Hermes runtime (Telegram adapter today; WhatsApp/etc. later).

model:
  provider: custom
  default: "grok-4.5"

providers:
  custom:
    name: FromDonna LLM Proxy
    base_url: "https://fromdonna-llm-proxy.code-df4.workers.dev/v1"
    key_env: FROMDONNA_LLM_CAPABILITY
    default_model: "grok-4.5"
    api_mode: chat_completions

display:
  streaming: false   # CLI terminal only — does not control Telegram
  tool_progress: false
  # Hide "💾 Self-improvement review: …" chat notices (review still runs).
  memory_notifications: off
  # Consumer UX: no mid-turn status spam or "I'm busy" / first-time busy tips.
  # (busy tips are only attached to busy-ack messages, so this disables both.)
  busy_ack_enabled: false
  busy_steer_ack_enabled: false
  interim_assistant_messages: false
  # No "still working / heartbeat" status bubbles on long turns.
  long_running_notifications: false
  # Telegram DMs: keep platform default streaming on once master switch is on.
  platforms:
    telegram:
      streaming: true
      interim_assistant_messages: false
      long_running_notifications: false

# First-message profile-build offer off — plain intro / normal chat only.
onboarding:
  profile_build: off

# Real-time replies on messaging platforms.
# transport: auto → Telegram DMs use official Bot API sendMessageDraft
# (animated in-place preview); groups fall back to editMessageText.
# Docs: hermes user-guide/messaging/telegram.md (streaming)
streaming:
  enabled: true
  transport: auto
  edit_interval: 0.8
  buffer_threshold: 24

# Dangerous-command approvals (official Hermes approvals block).
# FromDonna sandboxes are single-user isolated VMs — auto-approve by default
# so Telegram turns are not blocked waiting for inline approval buttons.
# mode: off ≡ --yolo (hardline blocklist + approvals.deny still apply).
# Docs: hermes user-guide/security.md
approvals:
  mode: off
  cron_mode: approve
  destructive_slash_confirm: false
  mcp_reload_confirm: false

# Channel-agnostic agent tool surface.
# Do NOT use hermes-telegram / hermes-whatsapp composites here — those names
# are transport-specific. Use hermes-cli (same _HERMES_CORE_TOOLS pack) for
# every messaging channel so Telegram / WhatsApp / future platforms stay in
# lockstep. Edit the anchor once; all listed platforms inherit it.
platform_toolsets:
  telegram: &agent_tools
    - hermes-cli
  whatsapp: *agent_tools
  whatsapp_cloud: *agent_tools
  # Add new messaging platforms here with: <name>: *agent_tools
  cli: *agent_tools
  cron: *agent_tools
  api_server:
    - hermes-api-server

plugins:
  enabled:
    - fromdonna_transport

# Telegram platform is owned by the in-sandbox GatewayRunner bridge.
# The Bot token is a stub — Worker owns real Bot API delivery.
platforms:
  telegram:
    enabled: true
    # Consumer DM UX: never quote the user's message on bot replies.
    # Default Hermès "first" makes every send() re-attach a purple reply
    # header ("Name / original text") when the agent sends multiple bubbles.
    # FromDonna is 1:1 DMs.
    reply_to_mode: "off"
    # Official Hermes group response whitelist (→ TELEGRAM_ALLOWED_CHATS).
    # When non-empty, group/supergroup messages outside this list are ignored.
    # DMs are never filtered. "0" is not a real Telegram group chat id, so this
    # is DM-only: no groups/supergroups are accepted.
    # Docs: hermes user-guide/messaging/telegram.md (allowed_chats).
    allowed_chats:
      - "0"
    observe_unmentioned_group_messages: false
    extra:
      # Do not let @mentions bypass the empty group whitelist (guest_mode).
      guest_mode: false

      # Official Hermes slash-command access control (gateway/slash_access.py).
      # Gating turns ON only when allow_admin_from is non-empty. FromDonna is
      # 1 user / 1 sandbox with no operator admin on Telegram, so use a
      # non-matching sentinel: every real user is a non-admin.
      # Non-admins may only run user_allowed_commands (+ Hermes floor /help,/whoami).
      allow_admin_from:
        - "__fromdonna_no_admin__"
      user_allowed_commands:
        - new
      group_allow_admin_from:
        - "__fromdonna_no_admin__"
      group_user_allowed_commands:
        - new

      # Telegram / menu: show only /new (dispatch still gated above).
      command_menu:
        max_commands: 1
        priority_mode: replace
        priority:
          - new

agent: {}

# ── Composio MCP (official Hermes shape) ─────────────────────────────────
# Same block Hermes documents for Composio (composio.dev/hermes):
#
#   mcp_servers:
#     composio:
#       url: "https://connect.composio.dev/mcp"
#       headers:
#         x-consumer-api-key: "YOUR_COMPOSIO_API_KEY"
#       connect_timeout: 60
#       timeout: 180
#
# Multi-user FromDonna adaptation (secrets never in the sandbox image):
# - URL is the shared fromdonna-composio-proxy /mcp endpoint (not connect.composio.dev).
# - Header is a per-user Bearer minted by the gateway at /bootstrap
#   (FROMDONNA_COMPOSIO_MCP_TOKEN), not COMPOSIO_API_KEY.
# - Hermes auto-includes every mcp_servers.* name into platform toolsets
#   (include_default_mcp_servers=true) — same as a normal Hermes install.
# Token is injected as env at bootstrap; ${…} is expanded by Hermes MCP loader.
mcp_servers:
  composio:
    url: "https://fromdonna-composio-proxy.code-df4.workers.dev/mcp"
    headers:
      Authorization: "Bearer ${FROMDONNA_COMPOSIO_MCP_TOKEN}"
    connect_timeout: 60
    timeout: 180
    # Composio/proxy answers streamable HTTP over POST; HEAD/GET preflight can mis-detect.
    skip_preflight: true

# Web research: Exa by default. Real EXA_API_KEY lives on fromdonna-api-proxy;
# sandbox gets EXA_API_KEY=STUB + EXA_BASE_URL={api-proxy}/v1/exa (bootstrap/create).
web:
  backend: exa
