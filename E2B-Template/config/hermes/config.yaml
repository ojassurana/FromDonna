# Agent-only configuration baked into every FromDonna sandbox.
# The Telegram Worker owns channels; the sandbox only receives /turn requests.
# LLM credentials never live here — only a per-turn capability token from the Worker.
model:
  provider: custom
  base_url: "https://fromdonna-llm-proxy.code-df4.workers.dev/v1"
  default: "gpt-5.6-terra"

display:
  streaming: false

agent: {}
