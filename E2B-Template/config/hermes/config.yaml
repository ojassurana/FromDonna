# Agent-only configuration baked into every FromDonna sandbox.
# Cloudflare Worker = Telegram edge (webhook + provision + Bot API delivery).
# Sandbox = official Hermes Telegram gateway runtime (GatewayRunner + TelegramAdapter).

model:
  provider: custom
  default: "grok-4.5"

providers:
  custom:
    name: FromDonna LLM Proxy
    base_url: "https://fromdonna-llm-proxy.code-df4.workers.dev/v1"
    key_env: FROMDONNA_LLM_CAPABILITY
    default_model: "grok-4.5"
    api_mode: chat_completions

display:
  streaming: false
  tool_progress: false

# Official Hermes Telegram tool surface inside the sandbox.
platform_toolsets:
  telegram:
    - hermes-telegram
  api_server:
    - hermes-api-server
  cli:
    - hermes-cli

plugins:
  enabled:
    - fromdonna_transport

# Telegram platform is owned by the in-sandbox GatewayRunner bridge.
# The Bot token is a stub — Worker owns real Bot API delivery.
platforms:
  telegram:
    enabled: true

agent: {}
