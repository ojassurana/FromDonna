# Ops-only message-flow dashboard (read-only over D1 turn traces).
# Gateway writes turns; this Worker never handles Telegram or sandboxes.
name = "fromdonna-ops-dashboard"
main = "src/index.ts"
compatibility_date = "2026-07-13"
workers_dev = true
preview_urls = true

# Custom host: dashboard.fromdonna.com → this Worker
# DNS: CNAME dashboard → fromdonna-ops-dashboard.code-df4.workers.dev (proxied)
routes = [
  { pattern = "dashboard.fromdonna.com/*", zone_name = "fromdonna.com" },
  { pattern = "dashboard.fromdonna.com", zone_name = "fromdonna.com" },
]

# Same routing DB the gateway uses (message_turns / message_turn_events).
[[d1_databases]]
binding = "FROMDONNA_ROUTING"
database_name = "fromdonna-routing"
database_id = "51aa8d76-1d4d-4dff-ac00-7712dcf502bc"

# Secrets (wrangler secret put — never commit):
# OPS_ADMIN_SECRET   Bearer / login token for the UI (can match WORKER_TO_HARNESS_SECRET)
