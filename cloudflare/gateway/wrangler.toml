name = "fromdonna-telegram-gateway"
main = "src/index.ts"
compatibility_date = "2026-07-13"

[[d1_databases]]
binding = "FROMDONNA_ROUTING"
database_name = "fromdonna-routing"
database_id = "938cd24b-ded6-4830-9494-933bbf4278ce"

# Public runtime configuration. Secrets are provisioned separately.
[vars]
E2B_TEMPLATE = "fromdonna-hermes"
HARNESS_PORT = "8788"

# Secrets, never committed:
# TELEGRAM_BOT_TOKEN       Telegram Bot API token
# TELEGRAM_WEBHOOK_SECRET  Telegram webhook secret_token
# E2B_API_KEY              Team API key used only to provision/resume sandboxes
# WORKER_TO_HARNESS_SECRET Shared key presented to each sandbox harness
#
# Vars configured at deploy time:
# E2B_TEMPLATE = "fromdonna-hermes"
# HARNESS_PORT = "8788"
