# Channel-agnostic edge Worker (Telegram first; other channels later).
name = "fromdonna-gateway"
main = "src/index.ts"
compatibility_date = "2026-07-13"
# Free plan: no custom cpu_ms. Hermes turns run via waitUntil after the channel is ACKed.
workers_dev = true
preview_urls = true

# Ops UI host (message-flow dashboard). workers.dev URL still works.
# Live DNS: dashboard CNAME → fromdonna-gateway.code-df4.workers.dev (proxied)
# + zone Worker routes (managed here so deploys keep the binding).
routes = [
  { pattern = "dashboard.fromdonna.com/*", zone_name = "fromdonna.com" },
  { pattern = "dashboard.fromdonna.com", zone_name = "fromdonna.com" },
]

[[d1_databases]]
binding = "FROMDONNA_ROUTING"
database_name = "fromdonna-routing"
database_id = "51aa8d76-1d4d-4dff-ac00-7712dcf502bc"

# Per-user runtime checkpoints (agent-home + workspace). Channel-agnostic.
# Create the bucket once: npx wrangler r2 bucket create fromdonna-user-state
[[r2_buckets]]
binding = "USER_STATE"
bucket_name = "fromdonna-user-state"

# Public runtime configuration. Secrets are provisioned separately.
[vars]
E2B_TEMPLATE = "fromdonna-hermes"
HARNESS_PORT = "8788"
E2B_SANDBOX_DOMAIN = "e2b.dev"
COMPOSIO_PROXY_URL = "https://fromdonna-composio-proxy.code-df4.workers.dev"

# Secrets, never committed:
# TELEGRAM_BOT_TOKEN       Telegram Bot API token
# TELEGRAM_WEBHOOK_SECRET  Telegram webhook secret_token
# E2B_API_KEY              Team API key used only to provision/resume sandboxes
# WORKER_TO_HARNESS_SECRET Shared key presented to each sandbox harness after /bootstrap
# COMPOSIO_SESSION_SECRET  Optional; HMAC shared with composio-proxy (else WORKER_TO_HARNESS_SECRET)
#
# Product API keys (EXA_API_KEY, …) belong on fromdonna-api-proxy — not here.
# COMPOSIO_API_KEY belongs on fromdonna-composio-proxy only — not here.
#
# Vars:
# E2B_TEMPLATE = "fromdonna-hermes"
# HARNESS_PORT = "8788"
# E2B_SANDBOX_DOMAIN = "e2b.dev"
# COMPOSIO_PROXY_URL = "https://fromdonna-composio-proxy.<account>.workers.dev"
